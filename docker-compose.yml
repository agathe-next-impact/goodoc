services:
  db:
    image: postgres:16
    container_name: medsite-db
    restart: unless-stopped
    env_file:
      # POSTGRES_PASSWORD vient d'ici. Compose interpole `environment:` avant
      # de lire env_file, donc on ne peut pas exiger la var via `${VAR:?...}`
      # — il faut la laisser passer par env_file directement vers le conteneur.
      - .env.local
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medsite}
      POSTGRES_DB: ${POSTGRES_DB:-medsite}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medsite} -d ${POSTGRES_DB:-medsite}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
